name: scrape

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why you are running this manually (e.g., patch notes dropped)'
        required: false
        default: 'patch'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: scrape
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (fixture-gated selector logic)
        run: npm test

      - name: Scrape
        id: scrape
        run: npm run scrape

      - name: Detect changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain -- data/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open data refresh PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="data-refresh/${DATE}-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/
          git commit -m "chore(data): refresh hero data ${DATE}"
          git push -u origin "$BRANCH"

          BODY=$(cat <<EOF
          Auto-generated by [scrape run ${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}).

          Reason: ${{ inputs.reason }}

          Review the diff under \`data/\` before merging. Once merged to \`main\`, the new JSON is live at \`raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/data/\`.
          EOF
          )
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(data): refresh hero data ${DATE}" \
            --body "$BODY"

      - name: Raise / update failure issue
        if: always() && (failure() || steps.scrape.outputs.heroes_failed != '0' || steps.scrape.outputs.fixture_ok == 'false')
        uses: actions/github-script@v7
        env:
          TITLE: 'Scrape failures — DO NOT CLOSE'
        with:
          script: |
            const fs = require('fs');
            const title = process.env.TITLE;
            let body = `Run ${context.runId} on ${new Date().toISOString()} reported failures. See [logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;
            try {
              body = fs.readFileSync('.run/issue-body.md', 'utf8') + '\n\n---\n\n' + body;
            } catch {}
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50,
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
