name: scrape

on:
  schedule:
    - cron: '0 17 * * 2,3,4,5'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why you are running this manually'
        required: false
        default: 'ad-hoc'

permissions:
  contents: write
  issues: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (fixture-gated selector logic)
        run: npm test

      - name: Scrape
        id: scrape
        run: npm run scrape

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore(data): refresh perks $(date -u +%Y-%m-%d)"
          git push

      - name: Raise / update failure issue
        if: always() && (failure() || steps.scrape.outputs.heroes_failed != '0' || steps.scrape.outputs.fixture_ok == 'false')
        uses: actions/github-script@v7
        env:
          TITLE: 'Scrape failures — DO NOT CLOSE'
        with:
          script: |
            const fs = require('fs');
            const title = process.env.TITLE;
            let body = `Run ${context.runId} on ${new Date().toISOString()} reported failures. See [logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;
            try {
              body = fs.readFileSync('.run/issue-body.md', 'utf8') + '\n\n---\n\n' + body;
            } catch {}
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50,
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
