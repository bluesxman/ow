name: validate-published

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Validate published JSON
        id: validate
        env:
          OW_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/data
        run: npm run validate-published

      - name: Raise staleness issue
        if: failure()
        uses: actions/github-script@v7
        env:
          TITLE: 'Published data appears stale or broken'
        with:
          script: |
            const title = process.env.TITLE;
            const body = `validate-published workflow failed on ${new Date().toISOString()}. See [logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50,
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
